name: Build LLVM (MinGW, Zero Dependency Target)

on:
workflow_dispatch:

jobs:
build:
runs-on: windows-latest
timeout-minutes: 600

steps:
- name: Checkout
  uses: actions/checkout@v4

# =========================
# 1. 安装 MinGW 工具链
# =========================
- name: Setup MinGW
  run: |
    choco install mingw -y
    echo "C:\ProgramData\mingw64\bin" >> $env:GITHUB_PATH

- name: Verify GCC
  run: |
    gcc --version
    g++ --version

# =========================
# 2. Clone LLVM
# =========================
- name: Clone LLVM
  run: |
    git clone https://github.com/xfawa543/xfawa-llvm-project.git llvm-src

# =========================
# 3. Configure CMake (MinGW)
# =========================
- name: Configure LLVM (MinGW)
  run: |
    mkdir build
    cd build

    cmake ..\llvm-src\llvm ^
      -G "MinGW Makefiles" ^
      -DCMAKE_BUILD_TYPE=Release ^
      -DCMAKE_INSTALL_PREFIX=../install ^
      -DCMAKE_C_COMPILER=gcc ^
      -DCMAKE_CXX_COMPILER=g++ ^
      -DLLVM_TARGETS_TO_BUILD="X86" ^
      -DLLVM_ENABLE_PROJECTS="clang;lld" ^
      -DBUILD_SHARED_LIBS=OFF ^
      -DLLVM_BUILD_LLVM_DYLIB=OFF ^
      -DLLVM_LINK_LLVM_DYLIB=OFF ^
      -DLLVM_ENABLE_ASSERTIONS=OFF ^
      -DLLVM_INCLUDE_TESTS=OFF ^
      -DLLVM_INCLUDE_DOCS=OFF ^
      -DLLVM_INCLUDE_BENCHMARKS=OFF ^
      -DLLVM_ENABLE_ZLIB=OFF ^
      -DLLVM_ENABLE_ZSTD=OFF ^
      -DLLVM_ENABLE_TERMINFO=OFF ^
      -DLLVM_ENABLE_LIBXML2=OFF ^
      -DLLVM_USE_LINKER=lld

# =========================
# 4. Build
# =========================
- name: Build LLVM
  run: |
    cd build
    mingw32-make -j2

# =========================
# 5. Install
# =========================
- name: Install LLVM
  run: |
    cd build
    mingw32-make install

# =========================
# 6. Package
# =========================
- name: Package
  run: |
    7z a llvm-mingw.zip ./install/*

# =========================
# 7. Upload artifact
# =========================
- name: Upload
  uses: actions/upload-artifact@v4
  with:
    name: llvm-mingw
    path: llvm-mingw.zip